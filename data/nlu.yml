version: "3.1"

nlu:
- intent: greet
  examples: |
    - hey
    - hello
    - hi
    - hola
    - buenos días

- intent: goodbye
  examples: |
    - chau
    - bye
    - hasta luego

- intent: solicitar_presupuesto
  examples: |
    - quiero un presupuesto
    - necesito presupuestar una instalación
    - ¿me puedes pasar un presupuesto?
    - quiero cotizar un trabajo eléctrico

- intent: informar_direccion
  examples: |
    - La dirección es Av. Siempreviva 123, Garín
    - Calle Falsa 123
    - Vivo en la calle 9 de Julio 456
    - El trabajo es en calle 12345
    - es en la calle 12345 en Garín

# Mantener ejemplos base existentes si se desea
- intent: affirm
  examples: |
    - yes
    - y
    - indeed
    - correcto

- intent: deny
  examples: |
    - no
    - n
    - nunca
    - no quiero
