version: "3.1"

rules:
- rule: Saludar al usuario
  steps:
  - intent: saludo
  - action: utter_greet

- rule: Despedirse del usuario
  steps:
  - intent: despedida
  - action: utter_goodbye

- rule: Activar formulario de presupuesto
  steps:
  - intent: solicitar_presupuesto
  - action: presupuesto_form
  - active_loop: presupuesto_form

- rule: Calcular presupuesto tras completar
  condition:
  - active_loop: presupuesto_form
  steps:
  - action: presupuesto_form
  - active_loop: null
  - slot_was_set:
    - requested_slot: null
  - action: utter_confirmar_direccion
  - action: action_calcular_presupuesto

- rule: Say 'I am a bot' anytime the user challenges
  steps:
  - intent: desafio_bot
  - action: utter_iamabot

- rule: Manejar fallback
  steps:
  - intent: nlu_fallback
  - action: utter_default

- rule: Manejar dirección informada fuera de formulario
  steps:
  - intent: informar_direccion
  - action: utter_confirmar_direccion
