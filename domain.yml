version: "3.1"

intents:
  - saludo
  - despedida
  - desafio_bot
  - solicitar_presupuesto
  - informar_direccion
  - nlu_fallback
  - informar_trabajo
  - informar_visita

entities:
  - direccion
  - categoria_trabajo
  - descripcion_trabajo
  - fecha_visita

slots:
  direccion_trabajo:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: direccion
  categoria_trabajo:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: categoria_trabajo
  descripcion_trabajo:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: descripcion_trabajo
  fecha_visita:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: fecha_visita

forms:
  presupuesto_form:
    required_slots:
      - direccion_trabajo
      - categoria_trabajo
      - descripcion_trabajo
      - fecha_visita

responses:
  utter_greet:
  - text: "¡Hola! Soy tu asistente virtual. ¿Qué trabajo necesitas realizar?"

  utter_ask_direccion_trabajo:
  - text: "¿Cuál es la dirección del trabajo?"

  utter_ask_categoria_trabajo:
  - text: "¿Es una instalación, reparación o urgencia?"

  utter_ask_descripcion_trabajo:
  - text: "Por favor, dame una breve descripción del trabajo."

  utter_ask_fecha_visita:
  - text: "¿Cuándo te gustaría que pasemos a visitar el lugar?"

  utter_confirmar_presupuesto:
  - text: "Datos recibidos. Calculando presupuesto..."

  utter_goodbye:
  - text: "¡Hasta luego!"

  utter_iamabot:
  - text: "Soy un bot."

  utter_default:
  - text: "No te entiendo."

actions:
  - action_calcular_presupuesto

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
