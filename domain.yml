version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - bot_challenge
  - solicitar_presupuesto
  - informar_direccion
  - nlu_fallback

entities:
  - direccion

slots:
  direccion_trabajo:
    type: text
    influence_conversation: false
    mappings:
      - type: from_text
        intent: informar_direccion

forms:
  presupuesto_form:
    required_slots:
      - direccion_trabajo

responses:
  utter_greet:
  - text: "¡Hola! Soy tu asistente para presupuestar instalaciones eléctricas. ¿En qué puedo ayudarte hoy?"

  utter_goodbye:
  - text: "¡Hasta luego! Si necesitas otro presupuesto, solo escríbeme."

  utter_iamabot:
  - text: "Soy un asistente presupuestador especializado en instalaciones eléctricas."

  utter_pedir_direccion:
  - text: "Para comenzar, por favor indícame la dirección del lugar donde se realizará el trabajo."

  utter_confirmar_direccion:
  - text: "Perfecto, he registrado la dirección: {direccion_trabajo}. Procederé a calcular la distancia y el presupuesto."

  utter_default:
  - text: "Lo siento, no entendí bien. ¿Podrías reformular tu pregunta o decirme si deseas solicitar un presupuesto?"

actions:
  - action_calcular_presupuesto

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
