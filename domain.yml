version: "3.1"

intents:
  - saludo
  - despedida
  - desafio_bot
  - solicitar_presupuesto
  - informar_direccion
  - nlu_fallback

entities:
  - direccion

slots:
  direccion_trabajo:
    type: text
    influence_conversation: false
    mappings:
      - type: from_text
        intent: informar_direccion

forms:
  presupuesto_form:
    required_slots:
      - direccion_trabajo

responses:
  utter_greet:
  - text: "¡Hola! Soy tu asistente virtual especializado en presupuestos de instalaciones eléctricas. Estoy listo para calcular un costo estimado. Para comenzar, ¿podrías indicarme la dirección donde realizarás el trabajo?"

  utter_goodbye:
  - text: "¡Hasta luego! Quedo a disposición si necesitas realizar otro presupuesto."

  utter_iamabot:
  - text: "Soy un asistente presupuestador diseñado para facilitar la estimación de costos en proyectos eléctricos."

  utter_pedir_direccion:
  - text: "Para realizar una estimación precisa, por favor indícame la dirección del lugar donde se llevará a cabo la instalación."

  utter_confirmar_direccion:
  - text: "Dirección registrada: {direccion_trabajo}. Procederé con el cálculo del presupuesto estimado."

  utter_default:
  - text: "Lo siento, no he logrado comprender tu solicitud. ¿Podrías reformularla o indicarme si deseas solicitar un presupuesto eléctrico?"

actions:
  - action_calcular_presupuesto

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
