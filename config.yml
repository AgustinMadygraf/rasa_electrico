recipe: default.v1
assistant_id: presupuestador_electrico
language: es # Idioma del asistente

pipeline:
  # Tokenizador: divide el texto en unidades básicas (palabras)
  - name: WhitespaceTokenizer

  # Featurizer: crea representaciones vectoriales basadas en patrones regex

  - name: RegexFeaturizer
  # Featurizer: analiza la estructura gramatical básica (lemas, morfología)

  - name: LexicalSyntacticFeaturizer

  # Featurizer: cuenta vectores de palabras (bag-of-words)
  - name: CountVectorsFeaturizer

  # Featurizer: cuenta vectores a nivel de caracteres (útil para errores tipográficos)
  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 4

  # Clasificador principal: detecta intenciones y entidades simultáneamente
  - name: DIETClassifier
    epochs: 100
    constrain_similarities: true

  # Mapeador: ayuda a unificar sinónimos detectados
  - name: EntitySynonymMapper

  # Clasificador de respaldo: actúa cuando la confianza de las intenciones es baja
  - name: FallbackClassifier
    threshold: 0.7
    ambiguity_threshold: 0.1


policies:
  # Memoria: recuerda acciones pasadas para repetir comportamientos simples
  - name: MemoizationPolicy

  # Reglas: maneja flujos deterministas (ej: inicio de formulario, saludo)
  - name: RulePolicy

  # TED: Modelo predictivo basado en transformadores para flujos no lineales
  - name: TEDPolicy
    max_history: 5
    epochs: 100
    constrain_similarities: true

  # Robustez: detecta intenciones inesperadas durante flujos complejos (ej: formularios)
  - name: UnexpecTEDIntentPolicy
    max_history: 5
    epochs: 100
